spring:
  application:
    name: resume-analysis

  datasource:
    url: jdbc:h2:file:./data/resumedb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  
  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
      enabled: true

  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY}
      model: deepseek-chat
      base-url: https://api.deepseek.com
      chat:
        options:
          temperature: 0.7
          max-tokens: 4096

server:
  port: 8080
  servlet:
    context-path: /

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

file:
  upload-dir: ./uploads

resume:
  extract:
    async-enabled: true
    match-wait-timeout-ms: 60000
    match-poll-interval-ms: 2000

cache:
  ttl-seconds: 3600
  max-size: 1000

logging:
  level:
    root: INFO
    com.demo.resume: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
